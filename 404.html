<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
(function(){
  // ============================================================
  //  アプリ定義
  //  各アプリの GAS URL と、パス→クエリパラメタ変換ルールを定義
  //
  //  URL パターン:
  //    /s/SLUG/...           → デフォルトアプリ (schedule-poll)
  //    /s/APP_PREFIX/ARG/... → 指定アプリ
  //
  //  routes の各エントリ:
  //    pattern: パス部分の正規表現 (アプリ prefix 除去後)
  //    build(match): マッチ結果からクエリ文字列を組み立てる関数
  // ============================================================
  var APPS = {
    // --- schedule-poll (デフォルト: prefix なし) ---
    _default: {
      url: 'https://script.google.com/macros/s/AKfycbyEfDATdY_KqMV9fUGMebOwzIPskjRWwO7v8tnNipQYMYw37WatmKW9_kbCYhTbMxLl/exec',
      routes: [
        { pattern: /^([^\/]+)\/admin\/(.+)$/,  build: function(m){ return '?action=admin&id='+e(m[1])+'&token='+e(m[2]); } },
        { pattern: /^([^\/]+)\/edit\/(.+)$/,    build: function(m){ return '?action=poll&id='+e(m[1])+'&edit='+e(m[2]); } },
        { pattern: /^([^\/]+)\/results$/,       build: function(m){ return '?action=results&id='+e(m[1]); } },
        { pattern: /^([^\/]+)$/,                build: function(m){ return '?action=poll&id='+e(m[1]); } }
      ]
    },

    // --- 汎用 URL shortener (任意の長URL → /s/url/SLUG) ---
    // lookup:true の場合、GAS を直接開かず fetch で JSON を取得してから location.replace
    // （GAS iframe サンドボックス問題を回避）
    url: {
      url: 'https://script.google.com/macros/s/AKfycbwdnC8CPZ7Np0X1j59OScmuEkdHZj1gn2xGrTlL4NCqGPOTsEY9EeoDLMBXJPRymVZF/exec',
      lookup: true,
      routes: [
        { pattern: /^(.+)$/, build: function(m){ return '?k='+e(m[1]); } }
      ]
    }
  };

  function e(s){ return encodeURIComponent(s); }

  var path = location.pathname.replace(/^\/s\/?/, '').replace(/\/$/, '');
  if (!path) { location.href = '/s/'; return; }

  var parts = path.split('/');

  // 先頭がアプリ prefix かどうか判定
  var app, subpath;
  if (APPS[parts[0]]) {
    app = APPS[parts[0]];
    subpath = parts.slice(1).join('/');
  } else {
    app = APPS._default;
    subpath = path;
  }

  if (!app || !subpath) { location.href = '/s/'; return; }

  // ルートマッチング
  var url = null;
  for (var i = 0; i < app.routes.length; i++) {
    var m = subpath.match(app.routes[i].pattern);
    if (m) {
      url = app.url + app.routes[i].build(m);
      break;
    }
  }

  // どのルートにもマッチしなければ fallback (最初の部分を id として渡す)
  if (!url) {
    url = app.url + '?id=' + e(subpath);
  }

  // lookup モード: GAS から JSON を fetch → longUrl を取り出して直接リダイレクト
  // (GAS の iframe サンドボックス問題を回避するため)
  if (app.lookup) {
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.ok && d.longUrl) {
          location.replace(d.longUrl);
        } else {
          document.body.innerHTML =
            '<div style="font-family:-apple-system,sans-serif;max-width:480px;margin:3em auto;padding:1em">' +
            '<h1>Not Found</h1><p>Short URL key not registered.</p></div>';
        }
      })
      .catch(function(err){
        document.body.innerHTML =
          '<div style="font-family:-apple-system,sans-serif;max-width:480px;margin:3em auto;padding:1em">' +
          '<h1>Error</h1><p>' + (err && err.message ? err.message : String(err)) + '</p></div>';
      });
    return;
  }

  location.replace(url);
})();
</script>
</head>
<body>
<p>Redirecting... If not redirected, <a id="link" href="#">click here</a>.</p>
</body>
</html>
