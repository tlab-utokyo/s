<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
(function(){
  // ============================================================
  //  アプリ定義
  //  各アプリの GAS URL と、パス→クエリパラメタ変換ルールを定義
  //
  //  URL パターン:
  //    /s/SLUG/...           → デフォルトアプリ (schedule-poll)
  //    /s/APP_PREFIX/ARG/... → 指定アプリ
  //
  //  routes の各エントリ:
  //    pattern: パス部分の正規表現 (アプリ prefix 除去後)
  //    build(match): マッチ結果からクエリ文字列を組み立てる関数
  // ============================================================
  var APPS = {
    // --- schedule-poll (デフォルト: prefix なし) ---
    _default: {
      url: 'https://script.google.com/macros/s/AKfycbyEfDATdY_KqMV9fUGMebOwzIPskjRWwO7v8tnNipQYMYw37WatmKW9_kbCYhTbMxLl/exec',
      routes: [
        { pattern: /^([^\/]+)\/admin\/(.+)$/,  build: function(m){ return '?action=admin&id='+e(m[1])+'&token='+e(m[2]); } },
        { pattern: /^([^\/]+)\/edit\/(.+)$/,    build: function(m){ return '?action=poll&id='+e(m[1])+'&edit='+e(m[2]); } },
        { pattern: /^([^\/]+)\/results$/,       build: function(m){ return '?action=results&id='+e(m[1]); } },
        { pattern: /^([^\/]+)$/,                build: function(m){ return '?action=poll&id='+e(m[1]); } }
      ]
    },

    // --- 汎用 URL shortener (任意の長URL → /s/url/SLUG) ---
    // csv モード: Spreadsheet の公開 CSV を直接 fetch して slug → longUrl 検索
    // GAS コールドスタート (~10秒) を避けるための高速化経路
    // Spreadsheet は「リンクを知っている全員: 閲覧者」に共有されている必要あり
    url: {
      csv: 'https://docs.google.com/spreadsheets/d/1xP2YyaoxEM5QC0Auj3G6_3HNeHW9FYATCk-ESqs0L2k/gviz/tq?tqx=out:csv&sheet=mappings'
    }
  };

  function e(s){ return encodeURIComponent(s); }

  var path = location.pathname.replace(/^\/s\/?/, '').replace(/\/$/, '');
  if (!path) { location.href = '/s/'; return; }

  var parts = path.split('/');

  // 先頭がアプリ prefix かどうか判定
  var app, subpath;
  if (APPS[parts[0]]) {
    app = APPS[parts[0]];
    subpath = parts.slice(1).join('/');
  } else {
    app = APPS._default;
    subpath = path;
  }

  if (!app || !subpath) { location.href = '/s/'; return; }

  function showError(title, msg) {
    document.body.innerHTML =
      '<div style="font-family:-apple-system,sans-serif;max-width:480px;margin:3em auto;padding:1em">' +
      '<h1>' + title + '</h1><p>' + msg + '</p></div>';
  }

  // csv モード: Spreadsheet 公開CSV を fetch して slug → longUrl で検索
  if (app.csv) {
    fetch(app.csv)
      .then(function(r){ if (!r.ok) throw new Error('CSV fetch failed: ' + r.status); return r.text(); })
      .then(function(csv){
        var rows = parseCSV(csv);
        for (var i = 1; i < rows.length; i++) {
          if (rows[i][0] === subpath) {
            location.replace(rows[i][1]);
            return;
          }
        }
        showError('Not Found', 'Short URL key "<code>' + escapeHtml(subpath) + '</code>" is not registered.');
      })
      .catch(function(err){
        showError('Error', (err && err.message) ? err.message : String(err));
      });
    return;
  }

  // routes ベース: パスから GAS クエリを組み立てて navigate
  var url = null;
  for (var i = 0; i < app.routes.length; i++) {
    var m = subpath.match(app.routes[i].pattern);
    if (m) {
      url = app.url + app.routes[i].build(m);
      break;
    }
  }
  if (!url) url = app.url + '?id=' + e(subpath);

  location.replace(url);

  // -------- CSV parser (RFC 4180 準拠、ダブルクォート・改行対応) --------
  function parseCSV(text) {
    var rows = [], row = [], cell = '', quoted = false;
    for (var i = 0; i < text.length; i++) {
      var c = text.charAt(i);
      if (quoted) {
        if (c === '"') {
          if (text.charAt(i+1) === '"') { cell += '"'; i++; }
          else { quoted = false; }
        } else { cell += c; }
      } else {
        if (c === '"') quoted = true;
        else if (c === ',') { row.push(cell); cell = ''; }
        else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
        else if (c !== '\r') cell += c;
      }
    }
    if (cell.length || row.length) { row.push(cell); rows.push(row); }
    return rows;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
</script>
</head>
<body>
<p>Redirecting... If not redirected, <a id="link" href="#">click here</a>.</p>
</body>
</html>
