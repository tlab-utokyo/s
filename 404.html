<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
(function(){
  // tlab-utokyo.github.io/s/SLUG            → GAS?action=poll&id=SLUG
  // tlab-utokyo.github.io/s/SLUG/results    → GAS?action=results&id=SLUG
  // tlab-utokyo.github.io/s/SLUG/admin/TOK  → GAS?action=admin&id=SLUG&token=TOK
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbyEfDATdY_KqMV9fUGMebOwzIPskjRWwO7v8tnNipQYMYw37WatmKW9_kbCYhTbMxLl/exec';

  var path = location.pathname.replace(/^\/s\/?/, '').replace(/\/$/, '');
  if (!path) { location.href = '/s/'; return; }

  var parts = path.split('/');
  var slug = parts[0];
  var url;

  if (parts.length === 1) {
    // /s/SLUG → poll
    url = GAS_URL + '?action=poll&id=' + encodeURIComponent(slug);
  } else if (parts[1] === 'results') {
    // /s/SLUG/results
    url = GAS_URL + '?action=results&id=' + encodeURIComponent(slug);
  } else if (parts[1] === 'admin' && parts[2]) {
    // /s/SLUG/admin/TOKEN
    url = GAS_URL + '?action=admin&id=' + encodeURIComponent(slug) + '&token=' + encodeURIComponent(parts[2]);
  } else if (parts[1] === 'edit' && parts[2]) {
    // /s/SLUG/edit/TOKEN → poll with edit token
    url = GAS_URL + '?action=poll&id=' + encodeURIComponent(slug) + '&edit=' + encodeURIComponent(parts[2]);
  } else {
    // fallback
    url = GAS_URL + '?action=poll&id=' + encodeURIComponent(slug);
  }

  location.replace(url);
})();
</script>
</head>
<body>
<p>Redirecting... If not redirected, <a id="link" href="#">click here</a>.</p>
</body>
</html>
